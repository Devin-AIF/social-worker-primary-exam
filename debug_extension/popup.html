<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 400px; padding: 15px; font-family: sans-serif; }
    .btn { background: #4285f4; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; width: 100%; }
    .btn:hover { background: #357abd; }
    .logs { background: #f1f1f1; height: 150px; overflow-y: auto; margin-top: 10px; font-size: 11px; padding: 5px; border: 1px solid #ddd; }
    .log-entry { margin-bottom: 3px; }
    .ERROR { color: red; }
    .JS_ERROR { color: darkred; font-weight: bold; }
    .SYSTEM { color: blue; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: 10px; background: #eee; padding: 5px; max-height: 200px; overflow-y: auto; }
    h3 { margin-top: 0; }
  </style>
</head>
<body>
  <h3>Scraper Debugger</h3>
  <button id="captureBtn" class="btn">捕获当前页面状态并复制报告</button>
  <button id="exportBtn" class="btn" style="margin-top: 10px; background: #34a853;">导出调试报告 (JSON)</button>
  <div class="logs" id="logContainer"></div>
  <div id="status" style="margin-top:5px; font-size:12px; color: green;"></div>
  
  <p style="font-size: 11px; color: #666;">点击按钮后，会将当前页面的结构、可见性信息以及报错日志复制到剪贴板，请将其发给 AI 定位问题。</p>
  <script src="popup.js"></script>
</body>
</html>
