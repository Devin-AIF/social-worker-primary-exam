<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 400px; padding: 15px; font-family: sans-serif; }
    .btn { color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; width: 100%; margin-bottom: 8px; font-weight: bold; }
    #monitorBtn { background: #4285f4; }
    #monitorBtn.active { background: #ea4335; }
    #exportBtn { background: #34a853; }
    .logs { background: #f1f1f1; height: 180px; overflow-y: auto; margin-top: 10px; font-size: 11px; padding: 5px; border: 1px solid #ddd; }
    .log-entry { margin-bottom: 4px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
    .ANTI_CRAWL_HIT { color: #d93025; font-weight: bold; }
    .ANTI_CRAWL_TEXT { color: #f29900; font-weight: bold; }
    .ANALYSIS_DETECTION { color: #1e8e3e; }
    .ERROR { color: #d93025; }
    .SYSTEM { color: #1a73e8; font-style: italic; }
    h3 { margin-top: 0; color: #3c4043; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    #statusIndicator { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
    #statusIndicator.on { background: #34a853; box-shadow: 0 0 5px #34a853; }
  </style>
</head>
<body>
  <div class="status-bar">
    <h3>Scraper Monitor</h3>
    <div id="statusIndicator"></div>
  </div>
  
  <button id="monitorBtn" class="btn">开始实时监控</button>
  <button id="exportBtn" class="btn">导出完整调试报告 (JSON)</button>
  
  <div style="font-size: 11px; color: #5f6368; margin-bottom: 5px;">实时事件流 (捕获反爬、弹窗与解析逻辑):</div>
  <div class="logs" id="eventContainer"></div>
  
  <p style="font-size: 11px; color: #666; line-height: 1.4;">
    <b>使用建议：</b>遇到报错或反爬时，先点击“开始监控”，然后在网页上进行操作，最后点击“导出报告”发给我。
  </p>
  <script src="popup.js"></script>
</body>
</html>
